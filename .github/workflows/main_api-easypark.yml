name: Build and deploy JAR app to Azure Web App - API-EASYPARK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      # Aqui está o pulo do gato: apontamos direto para o arquivo pom.xml
      - name: Build with Maven
        run: mvn clean install -f easypark-java/pom.xml

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: easypark-java/target/*.jar

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_46BD38851A5245AC910815CA6EC568CF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AA53470B12E442479E303BC6DA940494 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_02A1D16AC6364F1E83FF062DF8DEFC55 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'API-EASYPARK'
          slot-name: 'Production'
          package: '*.jar'
